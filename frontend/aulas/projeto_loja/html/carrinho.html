<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Carrinho | Anime Store</title>

    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/carrinho.css">

    <script src="../js/carrinho.js" type="module" defer></script>

</head>

<body>

    <!-- ========================= -->
    <!-- Cabeçalho                 -->
    <!-- ========================= -->

    <header id="cabecalho">

        <div id="logo">
            Anime Store
        </div>

        <nav id="menu">

            <ul>

                <li><a href="form.html">Cadastro</a></li>

                <li><a href="produtos.html">Produtos</a></li>

                <li><a href="sobre.html">Sobre</a></li>

                <li><a href="carrinho.html">🛒 Carrinho</a></li>

            </ul>

        </nav>

    </header>

    <!-- ========================= -->
    <!-- Banner                    -->
    <!-- ========================= -->

    <main>

        <section class="banner">

            <h1>🛒 Meu Carrinho</h1>

            <p>
                Confira seus produtos antes de finalizar sua compra.
            </p>

        </section>

        <!-- ========================= -->
        <!-- Carrinho                  -->
        <!-- ========================= -->

        <section class="container">

            <!-- Produtos -->

            <section id="itens-carrinho">

                <!--
                    Os produtos serão criados
                    automaticamente pelo carrinho.js
                -->

            </section>

            <!-- Resumo -->

            <aside id="resumo">

                <h2>Resumo da Compra</h2>

                <div class="linha-resumo">

                    <span>Produtos</span>

                    <span id="valor-produtos">

                        R$ 0,00

                    </span>

                </div>

                <div class="linha-resumo">

                    <span>Frete</span>

                    <span>

                        Grátis

                    </span>

                </div>

                <hr>

                <div class="linha-resumo total">

                    <span>Total</span>

                    <span id="valor-total">

                        R$ 0,00

                    </span>

                </div>

                <button id="btn-finalizar">

                    Finalizar Compra

                </button>

            </aside>

        </section>

    </main>

    <!-- ========================= -->
    <!-- Rodapé                    -->
    <!-- ========================= -->

    <footer id="rodape">

        <h3>© 2026 Anime Store</h3>

        <p>

            Pagamento via Pix, Cartão e Boleto.

        </p>

    </footer>

</body>

</html>
