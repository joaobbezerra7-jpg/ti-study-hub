<!DOCTYPE html>

<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cadastro | Anime Store</title>

<link rel="stylesheet" href="../css/form_style.css">

</head>

<body>

<header id="cabecalho">

<div id="logo">

Anime Store

</div>

<nav id="menu">

<ul>

<li><a href="produtos.html">Produtos</a></li>

<li><a href="sobre.html">Sobre</a></li>

<li><a href="carrinho.html">🛒 Carrinho</a></li>

</ul>

</nav>

</header>

<main>

<section class="banner">

<h1>Cadastro</h1>

<p>

Crie sua conta para acompanhar pedidos e comprar seus colecionáveis.

</p>

</section>

<section class="container">

<form id="form">

<h2>Dados Pessoais</h2>

<div class="linha">

<div class="campo">

<label>Nome Completo</label>

<input type="text" required>

</div>

</div>

<div class="linha">

<div class="campo">

<label>CPF</label>

<input type="text" required>

</div>

<div class="campo">

<label>Telefone</label>

<input type="tel">

</div>

</div>

<div class="linha">

<div class="campo">

<label>E-mail</label>

<input type="email" required>

</div>

</div>

<div class="linha">

<div class="campo">

<label>Data de Nascimento</label>

<input type="date">

</div>

</div>

<h2>Endereço</h2>

<div class="linha">

<div class="campo">

<label>CEP</label>

<input type="text">

</div>

<div class="campo">

<label>Número</label>

<input type="number">

</div>

</div>

<div class="linha">

<div class="campo">

<label>Logradouro</label>

<input type="text">

</div>

</div>

<div class="linha">

<div class="campo">

<label>Complemento</label>

<input type="text">

</div>

</div>

<div class="linha">

<div class="campo">

<label>Bairro</label>

<input type="text">

</div>

<div class="campo">

<label>Cidade</label>

<input type="text">

</div>

</div>

<div class="linha">

<div class="campo">

<label>Estado</label>

<input type="text">

</div>

</div>

<h2>Segurança</h2>

<div class="linha">

<div class="campo">

<label>Senha</label>

<input type="password">

</div>

</div>

<label class="check">

<input type="checkbox">

Desejo receber ofertas e novidades.

</label>

<button type="submit">

Criar Conta

</button>

</form>

</section>

</main>

<footer id="rodape">

<h3>© 2026 Anime Store</h3>

<p>

Pagamento via Pix, Cartão e Boleto.

</p>

</footer>

</body>

</html>
