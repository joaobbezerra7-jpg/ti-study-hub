<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
    <style>
        .pai {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
        }
            
            
            

        

        .filho1 {
            
             grid-column: 1 / 3;

        }

    </style>
</head>
<body>
    <h1>Grid</h1>
    <hr>
    <div class="pai">
        <div class="filho1">1</div>
        <div class="filho">2</div>
        <div class="filho">3</div>
        <div class="filho">4</div>
        <div class="filho">5</div>
        <div class="filho">6</div>
        <div class="filho">7</div>
        <div class="filho">8</div>
        <div class="filho">9</div>
        <div class="filho">10</div>
        <div class="filho">11</div>
        <div class="filho">12</div>
        
    </div>
</body>
</html>
