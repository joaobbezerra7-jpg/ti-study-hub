<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Questão 2</h1>
    <p>Entrar com um número e imprimir todos os seus divisores.</p>
<br>
<p>Digite um número</p>
<form id="formulario">
    <label for="num">Número:</label>
<input type="number" name="num" id="num">
<button type="submit">Enviar</button>
<button type="reset">Limpar</button>

</form>
<div id="div-resultado">

</div>

<script>
    const formDado = document.querySelector("#formulario");
    const resultado = document.querySelector("#div-resultado");

    formDado.addEventListener('submit', (evt) => {
        evt.preventDefault()

        const objFormDado = new FormData(formDado);

        let numero = parseFloat(objFormDado.get('num'));
        let divisores = [];

        for (let i = 0; i < numero; i++) {
            
           if (numero % i === 0) {
           divisores.push(i)
           }

           resultado.innerHTML = `Os divisores de ${numero} são: <br> ${divisores}`
        }

    })
</script>
</body>
</html>
