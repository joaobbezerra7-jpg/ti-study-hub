//COLEÇÃO DE DADOS - ARRAY
const presentes = ['Bicicleta', 'Celular', 'Camisa do Mengão', 'Pulseira', 'Tênis Adidas']

const divArray = document.querySelector('#div-array');

for (let i = 0; i < 5; i++) {
    divArray.innerHTML += `${presentes[i]}, `
    
}
const divForIn = document.querySelector('#div-for-in')

for (let posicao in presentes) {
   divForIn.innerHTML += `${presentes[posicao]}, `
}

const divForof = document.querySelector("#div-forof");

for (const obj of presentes) {
    divForof.innerHTML += ` ${obj}`
}

const divForEach = document.querySelector("#div-foreach")
presentes.forEach((elemento, i) => {
    divForEach.innerHTML += `${i} - ${elemento} <br>`
})

// COLEÇÃO DE OBJETOS LITERAIS - ARRAY
const pessoas = [
  { nome: 'Maria Flor', idade: 25, renda: 8500 },
  { nome: 'Oberdan Souza', idade: 75, renda: 5000 },
  { nome: 'Teoça', idade: 28, renda: 500 },
  { nome: 'Chicó', idade: 36, renda: 100 },
  { nome: 'João Grilo', idade: 37, renda: 80 }
];

// LISTANDO OBJETO LITERAL PELO FOR
const divListaObjFor = document.querySelector('#div-listaObj-for');

for (i = 0; i < pessoas.length; i++) {
    divListaObjFor.innerHTML += `${pessoas[i].nome}, ${pessoas[i].idade} R$ ${pessoas[i].renda.toFixed(2).replace('.', ',')} <br>`;
}
